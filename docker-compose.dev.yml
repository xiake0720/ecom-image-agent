services:
  postgres:
    image: postgres:16-alpine
    container_name: ecom-image-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecom_image_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ecom_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecom_image_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ecom-image-agent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ecom_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ecom_postgres_data:
  ecom_redis_data:
